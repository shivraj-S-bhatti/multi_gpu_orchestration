<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="860" viewBox="0 0 1120 860" role="img" aria-labelledby="title desc">
  <title id="title">Tutorial Run Metrics</title>
  <desc id="desc">A summary of world model training metrics across 8 logged steps.</desc>
  <rect width="1120" height="860" fill="#F4F7FB" />
  <defs>
    <linearGradient id="hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F6CBD" />
      <stop offset="100%" stop-color="#1F9D8B" />
    </linearGradient>
  </defs>
  <rect x="36" y="28" width="1048" height="160" rx="24" fill="url(#hero)" />
  <text x="68" y="84" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#FFFFFF">Tutorial Run Metrics</text>
  <text x="68" y="118" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#EAF3FB">Synthetic multimodal world-model run with JSONL step logs rendered as a dependency-free SVG.</text>
  <text x="68" y="148" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#D7E8F7">Logged steps: 1, 2, 3, 4, 5, 6, 7, 8</text>
  <text x="866" y="90" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#D7E8F7">Focus signals</text>
  <text x="866" y="116" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">loss, latency, throughput</text>
  <text x="866" y="144" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#D7E8F7">Use this plot before and after toggling AMP, DDP, batch size, or dataloader settings.</text>
  
  <g>
    <rect x="36.0" y="224.0" width="1048.0" height="178.0" rx="18" fill="#FFFFFF" stroke="#D8DEE6" />
    <text x="56.0" y="250.0" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#132238">Total Loss</text>
    <text x="56.0" y="270.0" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5B6876">Learning signal across logged steps</text>
    <text x="1064.0" y="250.0" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#D1495B">0.365</text>
    <text x="1064.0" y="270.0" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5B6876">min 0.359 / max 0.476</text>
    <line x1="54.0" y1="282.0" x2="1066.0" y2="282.0" stroke="#D8DEE6" stroke-width="1" stroke-dasharray="4 6" /><line x1="54.0" y1="314.0" x2="1066.0" y2="314.0" stroke="#D8DEE6" stroke-width="1" stroke-dasharray="4 6" /><line x1="54.0" y1="346.0" x2="1066.0" y2="346.0" stroke="#D8DEE6" stroke-width="1" stroke-dasharray="4 6" /><line x1="54.0" y1="378.0" x2="1066.0" y2="378.0" stroke="#D8DEE6" stroke-width="1" stroke-dasharray="4 6" />
    <polygon points="54.00,378.00 54.00,285.82 198.57,282.00 343.14,358.21 487.71,340.13 632.29,355.39 776.86,378.00 921.43,365.94 1066.00,373.30 1066.00,378.00" fill="#D1495B" opacity="0.12" />
