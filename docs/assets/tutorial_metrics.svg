    <text x="600.0" y="450.0" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#132238">Frames / Second</text>
    <text x="600.0" y="470.0" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5B6876">Effective global sequence throughput</text>
    <text x="1064.0" y="450.0" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#1F9D8B">805.502</text>
