    <text x="68.0" y="564.0" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5B6876">End-to-end latency per optimizer step</text>
    <text x="560.0" y="540.0" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#0F6CBD">317.814</text>
    <text x="560.0" y="564.0" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5B6876">min 317.814 / max 586.791</text>
    <line x1="66.0" y1="582.0" x2="562.0" y2="582.0" stroke="#D8DEE6" stroke-width="1" stroke-dasharray="4 6" /><line x1="66.0" y1="656.0" x2="562.0" y2="656.0" stroke="#D8DEE6" stroke-width="1" stroke-dasharray="4 6" /><line x1="66.0" y1="730.0" x2="562.0" y2="730.0" stroke="#D8DEE6" stroke-width="1" stroke-dasharray="4 6" /><line x1="66.0" y1="804.0" x2="562.0" y2="804.0" stroke="#D8DEE6" stroke-width="1" stroke-dasharray="4 6" />
    <polygon points="66.00,804.00 66.00,621.83 136.86,582.00 207.71,646.33 278.57,730.05 349.43,765.26 420.29,770.56 491.14,789.27 562.00,804.00 562.00,804.00" fill="#0F6CBD" opacity="0.12" />
    <polyline points="66.00,621.83 136.86,582.00 207.71,646.33 278.57,730.05 349.43,765.26 420.29,770.56 491.14,789.27 562.00,804.00" fill="none" stroke="#0F6CBD" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <text x="68.0" y="826.0" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#7A8794">latest 317.8 ms</text>
  </g>

  
  <g>
    <rect x="620.0" y="506.0" width="532.0" height="344.0" rx="18" fill="#FFFFFF" stroke="#D8DEE6" />
    <text x="640.0" y="540.0" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#132238">Frames / Second</text>
    <text x="640.0" y="564.0" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5B6876">Effective global sequence throughput</text>
    <text x="1132.0" y="540.0" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#1F9D8B">805.502</text>
    <text x="1132.0" y="564.0" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5B6876">min 436.271 / max 805.502</text>
    <line x1="638.0" y1="582.0" x2="1134.0" y2="582.0" stroke="#D8DEE6" stroke-width="1" stroke-dasharray="4 6" /><line x1="638.0" y1="656.0" x2="1134.0" y2="656.0" stroke="#D8DEE6" stroke-width="1" stroke-dasharray="4 6" /><line x1="638.0" y1="730.0" x2="1134.0" y2="730.0" stroke="#D8DEE6" stroke-width="1" stroke-dasharray="4 6" /><line x1="638.0" y1="804.0" x2="1134.0" y2="804.0" stroke="#D8DEE6" stroke-width="1" stroke-dasharray="4 6" />
    <polygon points="638.00,804.00 638.00,780.49 708.86,804.00 779.71,763.82 850.57,688.50 921.43,644.32 992.29,636.76 1063.14,607.75 1134.00,582.00 1134.00,804.00" fill="#1F9D8B" opacity="0.12" />
    <polyline points="638.00,780.49 708.86,804.00 779.71,763.82 850.57,688.50 921.43,644.32 992.29,636.76 1063.14,607.75 1134.00,582.00" fill="none" stroke="#1F9D8B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <text x="640.0" y="826.0" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#7A8794">latest 805.5 fps</text>
