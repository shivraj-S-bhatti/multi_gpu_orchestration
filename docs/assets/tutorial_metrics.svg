    <text x="56.0" y="470.0" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5B6876">End-to-end latency per optimizer step</text>
    <text x="520.0" y="450.0" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#0F6CBD">317.814</text>
    <text x="520.0" y="470.0" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5B6876">min 317.814 / max 586.791</text>
