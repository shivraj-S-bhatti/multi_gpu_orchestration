<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Tutorial Run Metrics</title>
  <desc id="desc">A summary of world model training metrics across 8 logged steps.</desc>
  <rect width="1200" height="900" fill="#F4F7FB" />
  <defs>
    <linearGradient id="hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F6CBD" />
      <stop offset="100%" stop-color="#1F9D8B" />
    </linearGradient>
  </defs>
  <rect x="48" y="32" width="1104" height="198" rx="28" fill="url(#hero)" />
  <text x="84" y="94" font-family="Helvetica, Arial, sans-serif" font-size="40" font-weight="700" fill="#FFFFFF">Tutorial Run Metrics</text>
  <text x="84" y="132" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#EAF3FB">Synthetic multimodal world-model run rendered from JSONL step logs with a dependency-free SVG generator.</text>
  <text x="84" y="160" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#D7E8F7">Logged steps: 1, 2, 3, 4, 5, 6, 7, 8</text>
  
  <g>
    <rect x="84.0" y="176.0" width="178.0" height="78" rx="20" fill="#FFFFFF" fill-opacity="0.14" stroke="#FFFFFF" stroke-opacity="0.16" />
    <text x="102.0" y="204.0" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#D8EEF7">latest loss</text>
    <text x="102.0" y="236.0" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">0.365</text>
  </g>

  
  <g>
    <rect x="282.0" y="176.0" width="190.0" height="78" rx="20" fill="#FFFFFF" fill-opacity="0.14" stroke="#FFFFFF" stroke-opacity="0.16" />
    <text x="300.0" y="204.0" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#D8EEF7">latest step time</text>
    <text x="300.0" y="236.0" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">317.8 ms</text>
  </g>

  
  <g>
    <rect x="492.0" y="176.0" width="208.0" height="78" rx="20" fill="#FFFFFF" fill-opacity="0.14" stroke="#FFFFFF" stroke-opacity="0.16" />
    <text x="510.0" y="204.0" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#D8EEF7">latest throughput</text>
    <text x="510.0" y="236.0" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">805.5 fps</text>
  </g>

  <text x="760" y="188" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#D7E8F7">Use this view to compare runs before and after</text>
  <text x="760" y="212" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#D7E8F7">changing AMP, DDP, batch size, or dataloader settings.</text>
  
  <g>
    <rect x="48.0" y="266.0" width="1104.0" height="206.0" rx="18" fill="#FFFFFF" stroke="#D8DEE6" />
    <text x="68.0" y="300.0" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#132238">Total Loss</text>
    <text x="68.0" y="324.0" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5B6876">Learning signal across logged steps</text>
    <text x="1132.0" y="300.0" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#D1495B">0.365</text>
    <text x="1132.0" y="324.0" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5B6876">min 0.359 / max 0.476</text>
    <line x1="66.0" y1="342.0" x2="1134.0" y2="342.0" stroke="#D8DEE6" stroke-width="1" stroke-dasharray="4 6" /><line x1="66.0" y1="370.0" x2="1134.0" y2="370.0" stroke="#D8DEE6" stroke-width="1" stroke-dasharray="4 6" /><line x1="66.0" y1="398.0" x2="1134.0" y2="398.0" stroke="#D8DEE6" stroke-width="1" stroke-dasharray="4 6" /><line x1="66.0" y1="426.0" x2="1134.0" y2="426.0" stroke="#D8DEE6" stroke-width="1" stroke-dasharray="4 6" />
    <polygon points="66.00,426.00 66.00,345.34 218.57,342.00 371.14,408.69 523.71,392.87 676.29,406.21 828.86,426.00 981.43,415.45 1134.00,421.89 1134.00,426.00" fill="#D1495B" opacity="0.12" />
