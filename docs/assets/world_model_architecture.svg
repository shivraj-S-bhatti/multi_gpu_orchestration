<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">World model architecture overview</title>
  <desc id="desc">Diagram showing the synthetic dataset, multimodal encoders, temporal backbone, and prediction heads.</desc>
  <rect width="1440" height="820" fill="#F4F7FB"/>
  <defs>
    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F6CBD"/>
      <stop offset="100%" stop-color="#1F9D8B"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#556D7E"/>
    </marker>
  </defs>

  <rect x="56" y="34" width="1328" height="118" rx="28" fill="url(#header)"/>
  <text x="94" y="89" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#FFFFFF">Multimodal World Model Throughput Lab</text>
  <text x="94" y="125" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#E8F3FB">Synthetic world-model pipeline with compact modules and profiler-friendly stage boundaries.</text>

  <rect x="70" y="192" width="230" height="510" rx="28" fill="#FFFFFF" stroke="#D8DEE6"/>
  <text x="98" y="238" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#132238">Dataset</text>
  <text x="98" y="266" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5B6876">Synthetic sequences</text>

  <rect x="98" y="314" width="174" height="86" rx="18" fill="#E8F1FA"/>
  <text x="122" y="355" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#0F6CBD">Frames</text>
  <text x="122" y="378" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#476072">RGB observations</text>

  <rect x="98" y="430" width="174" height="86" rx="18" fill="#E9F7F4"/>
  <text x="122" y="471" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#1F9D8B">Proprio</text>
  <text x="122" y="494" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#476072">state features</text>

  <rect x="98" y="546" width="174" height="86" rx="18" fill="#FBECEE"/>
  <text x="122" y="587" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#D1495B">Actions</text>
  <text x="122" y="610" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#476072">control inputs</text>

  <rect x="330" y="192" width="270" height="510" rx="28" fill="#FFFFFF" stroke="#D8DEE6"/>
  <text x="360" y="238" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#132238">Encoders</text>
  <text x="360" y="266" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5B6876">Per-modality tokenizers</text>

  <rect x="360" y="318" width="210" height="122" rx="22" fill="#E8F1FA"/>
  <text x="390" y="373" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#0F6CBD">CNN Encoder</text>
  <text x="390" y="398" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#476072">image tokens</text>

  <rect x="360" y="484" width="210" height="122" rx="22" fill="#E9F7F4"/>
  <text x="390" y="539" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#1F9D8B">MLP Encoder</text>
  <text x="390" y="564" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#476072">state + action</text>

  <rect x="640" y="174" width="420" height="546" rx="30" fill="#FFFFFF" stroke="#D8DEE6"/>
  <text x="674" y="224" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#132238">Temporal Backbone</text>
  <text x="674" y="252" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5B6876">Fuse tokens and model dynamics</text>

  <rect x="692" y="318" width="316" height="78" rx="22" fill="#EEF2FF"/>
  <text x="850" y="364" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#4B56D2">Fusion Projection</text>

  <rect x="692" y="438" width="316" height="152" rx="24" fill="#F2F5FA" stroke="#CBD4DE"/>
  <text x="850" y="497" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#132238">Causal Transformer</text>
  <text x="850" y="523" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#476072">sequence model</text>

  <rect x="736" y="628" width="228" height="42" rx="14" fill="#FFF2DE"/>
  <text x="850" y="654" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#B36B00">Next latent</text>

  <rect x="1100" y="192" width="220" height="510" rx="28" fill="#FFFFFF" stroke="#D8DEE6"/>
  <text x="1128" y="238" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#132238">Heads</text>
  <text x="1128" y="266" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5B6876">Prediction heads</text>

  <rect x="1138" y="316" width="144" height="72" rx="18" fill="#E8F1FA"/>
  <text x="1210" y="355" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#0F6CBD">Frame</text>
  <text x="1210" y="377" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#476072">decoder</text>

  <rect x="1138" y="430" width="144" height="72" rx="18" fill="#E9F7F4"/>
  <text x="1210" y="469" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#1F9D8B">State</text>
  <text x="1210" y="491" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#476072">head</text>

  <rect x="1138" y="544" width="144" height="62" rx="18" fill="#FFF2DE"/>
  <text x="1210" y="582" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#B36B00">Reward</text>

  <rect x="1138" y="634" width="144" height="62" rx="18" fill="#FBECEE"/>
  <text x="1210" y="672" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#D1495B">Done</text>

  <line x1="300" y1="447" x2="330" y2="447" stroke="#556D7E" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="600" y1="447" x2="640" y2="447" stroke="#556D7E" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1060" y1="447" x2="1100" y2="447" stroke="#556D7E" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="70" y="738" width="1250" height="54" rx="18" fill="#FFFFFF" stroke="#D8DEE6"/>
  <text x="94" y="771" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5B6876">NVTX hooks bracket H2D, forward, loss, backward, and optimizer so the diagram maps cleanly to the profiler timeline.</text>
</svg>

