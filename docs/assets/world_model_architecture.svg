<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">World model architecture overview</title>
  <desc id="desc">Diagram showing the synthetic dataset, multimodal encoders, temporal transformer backbone, and prediction heads.</desc>
  <rect width="1440" height="900" fill="#F4F7FB"/>
  <defs>
    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F6CBD"/>
      <stop offset="100%" stop-color="#1F9D8B"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#50687A"/>
    </marker>
  </defs>

  <rect x="56" y="34" width="1328" height="140" rx="30" fill="url(#header)"/>
  <text x="96" y="96" font-family="Helvetica, Arial, sans-serif" font-size="38" font-weight="700" fill="#FFFFFF">Multimodal World Model Throughput Lab</text>
  <text x="96" y="132" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#E7F3FB">A compact systems-learning project: synthetic trajectories, multimodal encoders, a causal transformer, and profiling hooks that map cleanly to Nsight timelines.</text>

  <rect x="70" y="220" width="250" height="520" rx="28" fill="#FFFFFF" stroke="#D8DEE6"/>
  <text x="100" y="268" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#132238">Dataset</text>
  <text x="100" y="300" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#5B6876">Long-horizon sequences generated on the fly</text>

  <rect x="100" y="340" width="190" height="96" rx="18" fill="#E8F1FA"/>
  <text x="126" y="383" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#0F6CBD">Frames</text>
  <text x="126" y="411" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#476072">RGB observations with</text>
  <text x="126" y="430" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#476072">agent and goal markers</text>

  <rect x="100" y="462" width="190" height="96" rx="18" fill="#E9F7F4"/>
  <text x="126" y="505" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#1F9D8B">Proprio</text>
  <text x="126" y="533" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#476072">Position, velocity, goal,</text>
  <text x="126" y="552" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#476072">and phase features</text>

  <rect x="100" y="584" width="190" height="96" rx="18" fill="#FBECEE"/>
  <text x="126" y="627" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#D1495B">Actions</text>
  <text x="126" y="655" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#476072">Control inputs that nudge</text>
  <text x="126" y="674" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#476072">the agent toward the goal</text>

  <rect x="390" y="220" width="290" height="520" rx="28" fill="#FFFFFF" stroke="#D8DEE6"/>
  <text x="422" y="268" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#132238">Encoders</text>
  <text x="422" y="300" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#5B6876">Separate streams map each modality into tokens</text>

  <rect x="422" y="344" width="226" height="150" rx="22" fill="#E8F1FA"/>
  <text x="450" y="390" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#0F6CBD">CNN Frame Encoder</text>
  <text x="450" y="422" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#476072">Convolutional kernels make it easy to study</text>
  <text x="450" y="444" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#476072">memory format, decoder cost, and image-path</text>
  <text x="450" y="466" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#476072">throughput under larger batch sizes.</text>

  <rect x="422" y="534" width="226" height="150" rx="22" fill="#E9F7F4"/>
  <text x="450" y="580" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#1F9D8B">MLP State Encoder</text>
  <text x="450" y="612" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#476072">The proprio and action path stays compact and</text>
  <text x="450" y="634" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#476072">GEMM-heavy, which makes performance changes</text>
  <text x="450" y="656" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#476072">easy to spot in profiling runs.</text>

  <rect x="750" y="200" width="390" height="560" rx="30" fill="#FFFFFF" stroke="#D8DEE6"/>
  <text x="786" y="256" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="700" fill="#132238">Temporal Backbone</text>
  <text x="786" y="290" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#5B6876">Fuse image and state tokens, add positional structure,</text>
  <text x="786" y="312" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#5B6876">and model long-horizon dynamics with a causal transformer.</text>

  <rect x="790" y="352" width="310" height="88" rx="22" fill="#EEF2FF"/>
  <text x="945" y="405" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#4B56D2">Fusion Projection</text>

  <rect x="790" y="476" width="310" height="180" rx="24" fill="#F2F5FA" stroke="#CBD4DE"/>
  <text x="945" y="526" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#132238">Causal Transformer</text>
  <text x="945" y="560" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#476072">Attention and MLP blocks expose the same</text>
  <text x="945" y="582" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#476072">occupancy, memory, and scaling questions you</text>
  <text x="945" y="604" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#476072">would investigate in a larger training system.</text>

  <rect x="812" y="688" width="266" height="42" rx="14" fill="#FFF2DE"/>
  <text x="945" y="715" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#B36B00">Predict next-step latent state</text>

  <rect x="1190" y="220" width="180" height="520" rx="28" fill="#FFFFFF" stroke="#D8DEE6"/>
  <text x="1222" y="268" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#132238">Heads</text>
  <text x="1222" y="300" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#5B6876">Supervision targets</text>

  <rect x="1222" y="340" width="116" height="82" rx="18" fill="#E8F1FA"/>
  <text x="1280" y="388" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#0F6CBD">Frame</text>
  <text x="1280" y="409" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#476072">decoder</text>

  <rect x="1222" y="452" width="116" height="82" rx="18" fill="#E9F7F4"/>
  <text x="1280" y="500" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#1F9D8B">State</text>
  <text x="1280" y="521" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#476072">prediction</text>

  <rect x="1222" y="564" width="116" height="70" rx="18" fill="#FFF2DE"/>
  <text x="1280" y="607" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#B36B00">Reward</text>

  <rect x="1222" y="652" width="116" height="70" rx="18" fill="#FBECEE"/>
  <text x="1280" y="695" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#D1495B">Done</text>

  <line x1="320" y1="480" x2="390" y2="480" stroke="#50687A" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="680" y1="480" x2="750" y2="480" stroke="#50687A" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1140" y1="480" x2="1190" y2="480" stroke="#50687A" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="354" y="462" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#5B6876">encode</text>
  <text x="715" y="462" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#5B6876">fuse and model</text>
  <text x="1164" y="462" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#5B6876">predict</text>

  <rect x="70" y="792" width="1300" height="66" rx="20" fill="#FFFFFF" stroke="#D8DEE6"/>
  <text x="96" y="833" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#5B6876">Profiling hooks surround host-to-device transfer, forward, loss, backward, and optimizer step so every box in this diagram has a visible counterpart in the Nsight timeline.</text>
</svg>

