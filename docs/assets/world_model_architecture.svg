<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">World model architecture overview</title>
  <desc id="desc">Diagram showing the synthetic dataset, multimodal encoders, transformer backbone, and prediction heads.</desc>
  <rect width="1280" height="760" fill="#F4F7FB"/>
  <defs>
    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F6CBD"/>
      <stop offset="100%" stop-color="#1F9D8B"/>
    </linearGradient>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#486071"/>
    </marker>
  </defs>
  <rect x="34" y="28" width="1212" height="118" rx="26" fill="url(#header)"/>
  <text x="70" y="82" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#FFFFFF">Multimodal World Model Throughput Lab</text>
  <text x="70" y="116" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#E6F2FA">Synthetic long-horizon trajectories feed a compact world model designed to expose the same performance questions you would ask on a larger training system.</text>

  <rect x="58" y="196" width="240" height="398" rx="24" fill="#FFFFFF" stroke="#D8DEE6"/>
  <text x="84" y="234" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#132238">Dataset</text>
  <text x="84" y="266" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5B6876">On-the-fly trajectories with long sequence windows</text>
  <rect x="84" y="300" width="188" height="70" rx="16" fill="#E8F1FA"/>
  <text x="104" y="342" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#0F6CBD">Frames</text>
  <text x="104" y="363" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#476072">RGB snapshots of agent and goal</text>
  <rect x="84" y="392" width="188" height="70" rx="16" fill="#E9F7F4"/>
  <text x="104" y="434" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#1F9D8B">Proprio</text>
  <text x="104" y="455" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#476072">Position, velocity, goal, phase</text>
  <rect x="84" y="484" width="188" height="70" rx="16" fill="#FBECEE"/>
  <text x="104" y="526" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#D1495B">Actions</text>
  <text x="104" y="547" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#476072">Simple control inputs per step</text>

  <rect x="372" y="196" width="254" height="398" rx="24" fill="#FFFFFF" stroke="#D8DEE6"/>
  <text x="398" y="234" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#132238">Encoders</text>
  <text x="398" y="266" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5B6876">Image and state/action streams produce aligned tokens</text>
  <rect x="398" y="304" width="202" height="108" rx="18" fill="#E8F1FA"/>
  <text x="420" y="346" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#0F6CBD">CNN Frame Encoder</text>
  <text x="420" y="372" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#476072">Conv kernels create profiling targets for</text>
  <text x="420" y="391" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#476072">memory format and decoder throughput</text>
  <rect x="398" y="440" width="202" height="108" rx="18" fill="#E9F7F4"/>
  <text x="420" y="482" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#1F9D8B">MLP State Encoder</text>
  <text x="420" y="508" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#476072">GEMM-heavy fusion path for proprio</text>
  <text x="420" y="527" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#476072">and action features</text>

  <rect x="702" y="160" width="312" height="470" rx="30" fill="#FFFFFF" stroke="#D8DEE6"/>
  <text x="734" y="210" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#132238">Temporal Backbone</text>
  <text x="734" y="242" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5B6876">Concatenate latents, add positions, run a causal transformer</text>
  <rect x="744" y="288" width="228" height="70" rx="18" fill="#EEF2FF"/>
  <text x="768" y="331" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#4B56D2">Fusion Projection</text>
  <rect x="744" y="388" width="228" height="142" rx="22" fill="#F2F5FA" stroke="#CBD4DE"/>
  <text x="768" y="426" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#132238">Causal Transformer</text>
  <text x="768" y="456" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#476072">Attention and MLP blocks expose</text>
  <text x="768" y="476" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#476072">occupancy, register pressure, and</text>
  <text x="768" y="496" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#476072">scaling behavior under DDP</text>
  <rect x="744" y="558" width="228" height="40" rx="12" fill="#FFF2DE"/>
  <text x="768" y="583" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#B36B00">Predict latent for next-step heads</text>

  <rect x="1068" y="196" width="166" height="398" rx="24" fill="#FFFFFF" stroke="#D8DEE6"/>
  <text x="1092" y="234" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#132238">Heads</text>
  <rect x="1092" y="282" width="118" height="74" rx="18" fill="#E8F1FA"/>
  <text x="1112" y="325" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#0F6CBD">Frame Decoder</text>
  <rect x="1092" y="376" width="118" height="74" rx="18" fill="#E9F7F4"/>
  <text x="1112" y="419" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#1F9D8B">State Head</text>
  <rect x="1092" y="470" width="118" height="54" rx="16" fill="#FFF2DE"/>
  <text x="1118" y="503" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#B36B00">Reward</text>
  <rect x="1092" y="542" width="118" height="54" rx="16" fill="#FBECEE"/>
  <text x="1115" y="575" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#D1495B">Done</text>

  <line x1="298" y1="336" x2="372" y2="336" stroke="#486071" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="298" y1="428" x2="372" y2="494" stroke="#486071" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="626" y1="356" x2="702" y2="324" stroke="#486071" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="626" y1="494" x2="702" y2="324" stroke="#486071" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1014" y1="430" x2="1068" y2="430" stroke="#486071" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="58" y="676" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#5B6876">Profiling hooks sit around batch transfer, forward, loss, backward, and optimizer step so you can connect code structure to Nsight timelines.</text>
</svg>

